services:
  - type: web
    name: fifa-sweepstake
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ADMIN_PASSWORD
        sync: false
      - key: FOOTBALL_PROVIDER
        value: manual
      - key: FOOTBALL_DATA_API_KEY
        sync: false
